name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Arm GNU Toolchain
        uses: carlosperate/arm-none-eabi-gcc-action@v1
        with:
          release: '13.3.Rel1'

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit cmake ninja

      - name: Run pre-commit
        run: pre-commit run --all-files

      - name: Configure
        run: cmake -S . -B build -G Ninja -DBOARD=nucleo_f103rb

      - name: Build
        run: cmake --build build --verbose

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-build
          path: |
            build/*.elf
            build/*.map
